name: docs

on:
  workflow_call:
    inputs:
      ref:
        description: Repository ref to build
        required: true
        type: string
      cache-namespace:
        description: Trusted namespace used to isolate link-check caches
        required: true
        type: string
      sha:
        description: Source commit used to key caches
        required: true
        type: string

env:
  UV_NO_EDITABLE: "true"
  UV_NO_SYNC: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      with:
        persist-credentials: false
        ref: "${{ inputs.ref }}"

    - name: Fetch release history
      uses: ./.github/actions/fetch-release-history
      with:
        github-token: "${{ github.token }}"
        ref: "${{ inputs.ref }}"

    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version-file: pyproject.toml

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
      with:
        enable-cache: false

    - name: Install command runner
      run: uv tool install rust-just

    - name: Install dependencies
      run: just env-sync doc

    - name: Build docs
      run: just doc-build

    - name: Upload docs
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
      with:
        name: docs-site
        path: site
        if-no-files-found: error
        include-hidden-files: true
        retention-days: 1

  check:
    name: Check links
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      with:
        persist-credentials: false
        ref: "${{ inputs.ref }}"

    - name: Download docs
      uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
      with:
        name: docs-site
        path: site

    - name: Restore link check cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: .lycheecache
        # Caches are immutable. Restore the newest cache in this trusted
        # namespace, then save updated responses under the current commit.
        key: cache-lychee-${{ inputs.cache-namespace }}-${{ inputs.sha }}
        restore-keys: cache-lychee-${{ inputs.cache-namespace }}-

    - name: Check links
      uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
      with:
        lycheeVersion: v0.21.0
        fail: true
        failIfEmpty: true
        token: "${{ github.token }}"
        args: >-
          --cache
          --verbose
          --no-progress
          README.md
          site
