name: CodSpeed

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

permissions: {}

env:
  UV_NO_EDITABLE: "true"
  # cisable glibc CPU-feature detection (AVX2) so benchmarks use the same
  # memory routines regardless of which CPU the runner lands on, reducing
  # cross-run variance. See:
  # https://codspeed.io/blog/why-glibc-faster-github-actions#how-to-fix-it-
  GLIBC_TUNABLES: "glibc.cpu.hwcaps=-AVX512F,-AVX512DQ,-AVX512_VBMI2,-AVX2,-AVX,-ERMS,-FSRM"
  RANDOMLY_SEED: "3485796098"

jobs:
  amd_benchmarks:
    name: amd64 benchmarks
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      with:
        persist-credentials: false

    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version-file: pyproject.toml

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
      with:
        enable-cache: false

    - name: Build msgspec and install profiling dependencies
      run: uv sync --group test-prof

    - name: Run benchmarks
      uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af  # v4.17.5
      with:
        mode: simulation
        run: uv run --no-sync pytest tests/prof/perf --randomly-seed="$RANDOMLY_SEED" --codspeed -k amd

  arm_benchmarks:
    name: arm benchmarks
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      with:
        persist-credentials: false

    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version-file: pyproject.toml

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
      with:
        enable-cache: false

    - name: Build msgspec and install profiling dependencies
      run: uv sync --group test-prof

    - name: Run benchmarks
      uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af  # v4.17.5
      with:
        mode: simulation
        run: uv run --no-sync pytest tests/prof/perf --codspeed --randomly-seed="$RANDOMLY_SEED" -k arm

  memory_benchmarks:
    name: Memory benchmarks
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      with:
        persist-credentials: false

    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version-file: pyproject.toml

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
      with:
        enable-cache: false

    - name: Build msgspec and install profiling dependencies
      run: uv sync --group test-prof

    - name: Run benchmarks
      uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af  # v4.17.5
      with:
        mode: memory
        run: uv run --no-sync pytest tests/prof/perf --randomly-seed="$RANDOMLY_SEED" --codspeed -k amd -m memory
